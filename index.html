  Format: "Store Name — Tagline"

<title>PolyForge — Premium 3D Assets Store</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── COLOUR TOKENS ─────────────────────────────────────────────
   All colours live here. Change one value = changes everywhere.
──────────────────────────────────────────────────────────────── */
:root {
  --bg:          #0d0f14;
  --bg2:         #13161e;
  --bg3:         #1a1e2a;
  --surface:     #1e2330;
  --surface2:    #252a38;
  --border:      #2a3045;
  --accent:      #6c63ff;   /* primary purple — change for a different brand colour */
  --accent2:     #a78bfa;   /* lighter purple highlight */
  --accent-glow: rgba(108,99,255,0.25);
  --orange:      #f97316;
  --green:       #22c55e;
  --text:        #e8eaf0;
  --text2:       #9aa0b8;
  --text3:       #5a6080;
  --radius:      10px;
  --card-radius: 12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
a{text-decoration:none;color:inherit}

/* ── TOPBAR ── */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 0;font-size:12px;color:var(--text2);text-align:center;letter-spacing:.03em}
.topbar span{color:var(--accent2);font-weight:600}

/* ── HEADER ── */
header{background:rgba(13,15,20,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:24px;padding:14px 24px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--orange));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.02em}
.logo-text span{color:var(--accent2)}
.search-bar{flex:1;max-width:480px;display:flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.search-bar input{flex:1;background:transparent;border:none;outline:none;padding:9px 16px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif}
.search-bar input::placeholder{color:var(--text3)}
.search-bar button{background:var(--accent);border:none;padding:0 18px;color:#fff;font-size:16px;cursor:pointer;transition:background .2s}
.search-bar button:hover{background:#5a52e8}
.header-actions{margin-left:auto;display:flex;align-items:center;gap:12px}
.btn-outline{padding:8px 18px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .2s;background:transparent}
.btn-outline:hover{border-color:var(--accent);color:var(--accent2)}
.btn-primary{padding:9px 20px;background:linear-gradient(135deg,var(--accent),#8b5cf6);border:none;border-radius:var(--radius);font-size:13px;font-weight:600;color:#fff;cursor:pointer;box-shadow:0 4px 16px var(--accent-glow)}
.btn-primary:hover{opacity:.88}
.cart-btn{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 14px;cursor:pointer;font-size:18px;transition:border-color .2s}
.cart-btn:hover{border-color:var(--accent)}
.cart-badge{position:absolute;top:-6px;right:-6px;background:var(--orange);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* ── NAV ── */
nav{background:var(--bg2);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:2px;padding:0 24px;overflow-x:auto;scrollbar-width:none}
.nav-inner::-webkit-scrollbar{display:none}
.nav-link{padding:13px 16px;font-size:13px;font-weight:500;color:var(--text2);white-space:nowrap;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;cursor:pointer}
.nav-link:hover,.nav-link.active{color:var(--text);border-bottom-color:var(--accent)}
.nav-link.active{color:var(--accent2)}
.nav-free{color:var(--green) !important;font-weight:600}

/* ── HERO ── */
.hero{position:relative;overflow:hidden;background:var(--bg2);padding:64px 24px 80px;border-bottom:1px solid var(--border)}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 60% 50%,rgba(108,99,255,.12),transparent 70%),radial-gradient(ellipse 40% 40% at 80% 30%,rgba(249,115,22,.07),transparent 70%)}
.hero-grid{position:absolute;inset:0;opacity:.04;background-image:linear-gradient(var(--accent) 1px,transparent 1px),linear-gradient(90deg,var(--accent) 1px,transparent 1px);background-size:40px 40px}
.hero-inner{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;position:relative;z-index:1}
.hero-label{display:inline-flex;align-items:center;gap:8px;background:rgba(108,99,255,.12);border:1px solid rgba(108,99,255,.3);border-radius:100px;padding:5px 14px;font-size:12px;font-weight:600;color:var(--accent2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:16px}
.hero-title{font-family:'Syne',sans-serif;font-size:clamp(32px,4vw,52px);font-weight:800;line-height:1.1;letter-spacing:-.03em;margin-bottom:20px}
.hero-title .hl{color:var(--accent2)}
.hero-desc{font-size:16px;color:var(--text2);max-width:480px;margin-bottom:32px;line-height:1.7}
.hero-cta{display:flex;gap:12px;flex-wrap:wrap}
.btn-hero{padding:13px 28px;font-size:15px;font-weight:600;background:linear-gradient(135deg,var(--accent),#8b5cf6);border:none;border-radius:var(--radius);color:#fff;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 6px 24px var(--accent-glow)}
.btn-hero:hover{transform:translateY(-2px);box-shadow:0 10px 32px var(--accent-glow)}
.btn-hero-out{padding:12px 28px;font-size:15px;font-weight:600;background:transparent;border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);cursor:pointer;transition:border-color .2s}
.btn-hero-out:hover{border-color:var(--accent2)}
.hero-stats{display:flex;gap:32px;margin-top:36px}
.stat-num{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--text)}
.stat-lbl{font-size:12px;color:var(--text3);margin-top:2px}

/* ── HERO MINI CARDS (right side preview) ── */
.hero-visual{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mini-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);overflow:hidden;transition:transform .3s;cursor:pointer}
.mini-card:hover{transform:translateY(-4px)}
.mini-card:nth-child(1){grid-column:span 2}
.mini-card-thumb{height:130px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--surface2),var(--bg3))}
.mini-card:nth-child(1) .mini-card-thumb{height:160px}
.mini-card-thumb img{width:100%;height:100%;object-fit:cover;display:none;position:absolute;inset:0}
.mini-card-thumb-bg{position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(108,99,255,.15),transparent 70%)}
.mini-card-thumb-emoji{position:relative;z-index:1;font-size:52px}
.mini-card:nth-child(1) .mini-card-thumb-emoji{font-size:80px}
.mini-card-info{padding:10px 12px}
.mini-card-name{font-size:12px;font-weight:600;color:var(--text)}
.mini-card-cat{font-size:11px;color:var(--text3);margin-top:2px}
.mini-card-price{font-size:13px;font-weight:700;color:var(--accent2);margin-top:4px}
.free-tag{color:var(--green)}

/* ── MAIN LAYOUT ── */
.main-container{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:240px 1fr;align-items:start}

/* ── SIDEBAR ── */
.sidebar{padding:28px 20px 28px 24px;border-right:1px solid var(--border);min-height:100vh;position:sticky;top:57px}
.sidebar-section{margin-bottom:28px}
.sidebar-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.filter-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:8px;cursor:pointer;transition:background .2s;font-size:13px;color:var(--text2)}
.filter-item:hover,.filter-item.active{background:var(--surface);color:var(--text)}
.filter-item.active{color:var(--accent2)}
.filter-count{background:var(--surface2);border-radius:100px;padding:1px 8px;font-size:11px;color:var(--text3)}
.filter-item.active .filter-count{background:rgba(108,99,255,.2);color:var(--accent2)}
.filter-icon{margin-right:8px;font-size:15px}
.range-track{width:100%;height:4px;background:var(--surface2);border-radius:2px;position:relative;margin:12px 0}
.range-fill{position:absolute;left:0;right:30%;top:0;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px}
.range-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--text3)}
.tag-cloud{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag{background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:4px 12px;font-size:12px;color:var(--text2);cursor:pointer;transition:all .2s}
.tag:hover,.tag.active{background:rgba(108,99,255,.15);border-color:var(--accent);color:var(--accent2)}

/* ── CONTENT ── */
.content{padding:28px 28px 40px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.section-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;letter-spacing:-.01em}
.section-title span{color:var(--accent2)}
.sort-bar{display:flex;align-items:center;gap:8px}
.sort-label{font-size:13px;color:var(--text3)}
.sort-select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;color:var(--text);cursor:pointer;outline:none;font-family:'DM Sans',sans-serif}
.view-toggle{display:flex;gap:4px}
.view-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:14px;transition:all .2s}
.view-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── PRODUCT CARDS ── */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.product-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);overflow:hidden;cursor:pointer;transition:transform .25s,box-shadow .25s,border-color .25s;position:relative}
.product-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.4);border-color:rgba(108,99,255,.4)}
.product-card:hover .card-overlay{opacity:1}
.card-thumb{height:160px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--bg3),var(--surface2))}
.card-thumb img{width:100%;height:100%;object-fit:cover;display:none;position:absolute;inset:0}
.card-thumb-bg{position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(108,99,255,.1),transparent 70%)}
.card-thumb-emoji{position:relative;z-index:1;font-size:56px}
.card-badge{position:absolute;top:10px;left:10px;padding:3px 9px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.badge-free{background:rgba(34,197,94,.2);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.badge-new{background:rgba(249,115,22,.2);color:var(--orange);border:1px solid rgba(249,115,22,.3)}
.badge-sale{background:rgba(239,68,68,.2);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.card-overlay{position:absolute;bottom:10px;right:10px;opacity:0;transition:opacity .2s}
.card-add-btn{background:var(--accent);border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;display:inline-block;text-decoration:none}
.card-body{padding:12px 14px}
.card-cat{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.card-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:8px}
.card-meta{display:flex;align-items:center;justify-content:space-between}
.card-price{font-size:16px;font-weight:700;color:var(--accent2)}
.card-price-free{color:var(--green)}
.card-price-old{font-size:11px;color:var(--text3);text-decoration:line-through;margin-left:4px}
.card-rating{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text3)}
.stars{color:#f59e0b;font-size:11px}

/* ── SECTION DIVIDER ── */
.section-divider{border:none;border-top:1px solid var(--border);margin:36px 0 28px}

/* ── MEMBERSHIP BANNER ── */
.member-banner{background:linear-gradient(135deg,#1a1e30,#1f1840);border:1px solid rgba(108,99,255,.3);border-radius:16px;padding:32px 36px;display:flex;align-items:center;justify-content:space-between;gap:24px;margin-bottom:36px;position:relative;overflow:hidden}
.member-banner::before{content:'';position:absolute;right:-60px;top:-60px;width:300px;height:300px;background:radial-gradient(circle,rgba(108,99,255,.2),transparent 70%);pointer-events:none}
.member-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.member-desc{font-size:14px;color:var(--text2);max-width:400px}
.member-price{text-align:right;flex-shrink:0}
.member-price-num{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--accent2)}
.member-features{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.member-feat{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.member-feat::before{content:'✓';color:var(--green);font-weight:700}

/* ── FOOTER ── */
footer{background:var(--bg2);border-top:1px solid var(--border);margin-top:64px;padding:48px 24px 28px}
.footer-inner{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;padding-bottom:40px;border-bottom:1px solid var(--border)}
.footer-desc{font-size:13px;color:var(--text3);line-height:1.7;max-width:280px;margin-top:14px}
.footer-socials{display:flex;gap:10px;margin-top:16px}
.social-btn{width:34px;height:34px;background:var(--surface);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:border-color .2s}
.social-btn:hover{border-color:var(--accent)}
.footer-col-title{font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:16px}
.footer-links{list-style:none;display:flex;flex-direction:column;gap:9px}
.footer-links a{font-size:13px;color:var(--text2);transition:color .2s}
.footer-links a:hover{color:var(--accent2)}
.footer-bottom{max-width:1280px;margin:20px auto 0;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text3)}

/* ── RESPONSIVE ── */
@media(max-width:1024px){.main-container{grid-template-columns:1fr}.sidebar{display:none}.hero-inner{grid-template-columns:1fr}.hero-visual{display:none}.footer-inner{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.header-inner{gap:12px}.search-bar{max-width:200px}.product-grid{grid-template-columns:1fr 1fr;gap:10px}.member-banner{flex-direction:column}.footer-inner{grid-template-columns:1fr}}
</style>
</head>

<script>

/* ════════════════════════════════════════════════════════════════
   SECTION 1 — STORE IDENTITY
   Change your brand name, tagline, logo emoji, and colours here.
════════════════════════════════════════════════════════════════ */
const STORE = {
  // EDIT B — Store name (two parts, second part gets accent colour)
  namePart1: 'Poly',
  namePart2: 'Forge',

  // EDIT C — Emoji shown in the logo box (or swap for an <img> — see guide)
  logoEmoji: '⬡',

  // EDIT D — Browser tab title
  pageTitle: 'PolyForge — Premium 3D Assets Store',

  // EDIT E — Top announcement bar  (use '' to hide it)
  topbarText: '🎁 Welcome! Use code <span>POLY20</span> for 20% off · New 3D packs added weekly',

  // EDIT F — Search input placeholder
  searchPlaceholder: 'Search 3D assets, characters, environments…',

  // EDIT G — Header membership button label
  membershipLabel: 'Get Membership',
};


/* ════════════════════════════════════════════════════════════════
   SECTION 2 — NAVIGATION LINKS
   Add / remove / rename links. Set  free:true  for the green style.
   Set  active:true  on the currently selected page link.
════════════════════════════════════════════════════════════════ */
const NAV_LINKS = [
  { label: 'Browse All',    href: 'index.html', active: true  },
  { label: 'Characters',    href: '#'                          },
  { label: 'Environments',  href: '#'                          },
  { label: 'Vehicles',      href: '#'                          },
  { label: 'Props & Items', href: '#'                          },

// Helpers
function logoHTML(p1, p2, emoji) {
  return `<div class="logo-icon">${emoji}</div><div class="logo-text">${p1}<span>${p2}</span></div>`;
}
function cardThumbHTML(card) {
  if (card.image) {
    return `<img src="${card.image}" alt="${card.name}" style="width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0">
            <div class="card-thumb-bg"></div>`;
  }
  return `<div class="card-thumb-bg"></div><span class="card-thumb-emoji">${card.emoji}</span>`;
}
function badgeHTML(b) {
  if (!b) return '';
  const cls = b==='FREE'?'badge-free': b==='NEW'?'badge-new':'badge-sale';
  return `<div class="card-badge ${cls}">${b}</div>`;
}
function priceHTML(price, old) {
  if (price==='FREE') return `<span class="card-price card-price-free">Free</span>`;
  return `<span class="card-price">${price}</span>${old?`<span class="card-price-old">${old}</span>`:''}`;
}
function ratingHTML(rating, stars) {
  if (!rating) return '';
  return `<div class="card-rating"><span class="stars">${stars}</span> ${rating}</div>`;
}
function titleHTML(raw) {
  // [word] → accent colour span
  return raw.replace(/\[([^\]]+)\]/g, '<span>$1</span>');
}
function heroTitleHTML(raw) {
  return raw.split('\n').map(line =>
    line.replace(/\[([^\]]+)\]/g,'<span class="hl">$1</span>')
  ).join('<br>');
}
function linkList(arr) {
  return arr.map(l=>`<li><a href="${l.href}">${l.label}</a></li>`).join('');
}

  if (fi) {
    fi.closest('.sidebar-section').querySelectorAll('.filter-item').forEach(x=>x.classList.remove('active'));
    fi.classList.add('active');
  }
  // tags
  if (e.target.classList.contains('tag')) e.target.classList.toggle('active');
  // nav
  const nl = e.target.closest('.nav-link');
  if (nl && !nl.classList.contains('nav-free')) {
    document.querySelectorAll('.nav-link').forEach(x=>x.classList.remove('active'));

    vb.closest('.view-toggle').querySelectorAll('.view-btn').forEach(x=>x.classList.remove('active'));
    vb.classList.add('active');

});

║  M  Hero preview cards                → HERO.previewCards[]       ║
║  N  Sidebar categories                → SIDEBAR_CATEGORIES[]      ║
║  O  File format tags                  → FORMAT_TAGS[]             ║
║  P  Engine tags                       → ENGINE_TAGS[]             ║
║  Q  Membership banner                 → MEMBERSHIP object         ║
║  R  Footer description                → FOOTER.desc               ║
║  S  Footer social links               → FOOTER.socials[]          ║
║  T  Footer link columns               → FOOTER.store / .cats etc  ║
║  U  Footer copyright line             → FOOTER.copyright          ║
║                                                                  ║
║  ADDING A NEW PRODUCT CARD                                       ║
║  ─────────────────────────────────────────────────────────────   ║
║  1. Find the SECTIONS array in the script block                  ║
║  2. Find the section you want (e.g. characters, environments)    ║
║  3. Copy an existing  { name:..., cat:..., ... }  block          ║
║  4. Paste it at the end of that section's  assets: [ ]           ║
║     (before the closing  ]  of assets)                           ║
║  5. Add a comma after the previous card if needed                ║
║  6. Fill in your values and save                                 ║
║                                                                  ║
║  ADDING YOUR OWN IMAGE TO A CARD                                 ║
║  ─────────────────────────────────────────────────────────────   ║
║  1. Put your image in  assets/images/  (create if missing)       ║
║  2. In the card object set:                                      ║
║         image: 'assets/images/my-asset.jpg'                     ║
║     The emoji becomes invisible once an image is set.            ║
║  Recommended: 400×300 px, .jpg for photos, .png for renders     ║
║                                                                  ║
║  ADDING A WHOLE NEW SECTION                                      ║
║  ─────────────────────────────────────────────────────────────   ║
║  1. In SECTIONS[], after the last  },  add:                      ║

║       browseLink: '#',                                           ║
║       assets: [                                                  ║

║           link: 'product-axe.html', btnLabel: '+ Cart' },       ║
║       ],                                                         ║
║     },                                                           ║
